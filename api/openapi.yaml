openapi: "3.0.3"
info:
  title: SauryCTF API
  version: "0.1.0"
  description: Next-generation CTF/AWD platform API

servers:
  - url: http://localhost:8080
    description: Development server

security: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ── Error ──────────────────────────────────────────────
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    # ── Auth ───────────────────────────────────────────────
    UserInfo:
      type: object
      required: [id, username, email, role, status]
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [user, team_captain, judge, admin, super_admin]
        status:
          type: string
          enum: [active, banned]
        created_at:
          type: string
          format: date-time

    RegisterRequest:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 64
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          description: Username or email
        password:
          type: string

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/UserInfo"

    AuthSetupStatusResponse:
      type: object
      required: [bootstrap_admin_available]
      properties:
        bootstrap_admin_available:
          type: boolean
        default_admin_username:
          type: string
        default_admin_password:
          type: string

    # ── Teams ──────────────────────────────────────────────
    Team:
      type: object
      required: [id, name, invite_code]
      properties:
        id:
          type: integer
        name:
          type: string
        invite_code:
          type: string
        created_at:
          type: string
          format: date-time
        members:
          type: array
          items:
            $ref: "#/components/schemas/TeamMember"
        lock:
          $ref: "#/components/schemas/TeamLockSummary"

    TeamLockSummary:
      type: object
      required: [locked, games]
      properties:
        locked:
          type: boolean
        reason:
          type: string
        games:
          type: array
          items:
            $ref: "#/components/schemas/TeamLockGame"

    TeamLockGame:
      type: object
      required: [game_id, name, start_time, end_time]
      properties:
        game_id:
          type: integer
        name:
          type: string
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time

    TeamMember:
      type: object
      required: [id, user_id, team_id, role]
      properties:
        id:
          type: integer
        user_id:
          type: integer
        team_id:
          type: integer
        role:
          type: string

    CreateTeamRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 128

    JoinTeamRequest:
      type: object
      required: [invite_code]
      properties:
        invite_code:
          type: string

    # ── Challenges ─────────────────────────────────────────
    Challenge:
      type: object
      required: [id, title, category, type]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [web, pwn, crypto, reverse, misc, forensics, awd]
        type:
          type: string
          enum: [static, dynamic]
        difficulty:
          type: string
          enum: [easy, medium, hard]
        base_score:
          type: integer
        min_score:
          type: integer
        decay_rate:
          type: number
        hints:
          type: string
        attachments:
          type: string
        is_visible:
          type: boolean
        created_at:
          type: string
          format: date-time

    CreateChallengeRequest:
      type: object
      required: [title, category, flag]
      properties:
        title:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [web, pwn, crypto, reverse, misc, forensics, awd]
        type:
          type: string
          enum: [static, dynamic]
        difficulty:
          type: string
          enum: [easy, medium, hard]
        flag:
          type: string
        flag_format:
          type: string
        base_score:
          type: integer
        min_score:
          type: integer
        decay_rate:
          type: number
        max_attempts:
          type: integer
        hints:
          type: string
        attachments:
          type: string
        container_spec:
          type: string
        is_visible:
          type: boolean

    UpdateChallengeRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        category:
          type: string
        type:
          type: string
        difficulty:
          type: string
        flag:
          type: string
        flag_format:
          type: string
        base_score:
          type: integer
        min_score:
          type: integer
        decay_rate:
          type: number
        max_attempts:
          type: integer
        hints:
          type: string
        attachments:
          type: string
        container_spec:
          type: string
        is_visible:
          type: boolean

    SubmitFlagRequest:
      type: object
      required: [flag, game_id]
      properties:
        flag:
          type: string
        game_id:
          type: integer

    SubmitResult:
      type: object
      required: [correct, message]
      properties:
        correct:
          type: boolean
        is_practice:
          type: boolean
        score:
          type: integer
        blood_type:
          type: string
          enum: [first, second, third]
        message:
          type: string

    # ── Games ──────────────────────────────────────────────
    Game:
      type: object
      required: [id, name, start_time, end_time, status]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        notice:
          type: string
        divisions:
          type: array
          items:
            type: string
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        scoreboard_freeze_at:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum: [draft, active, ended]
        registration_mode:
          type: string
          enum: [review, auto_accept]
        max_team_members:
          type: integer
        practice_mode:
          type: boolean
        writeup_required:
          type: boolean
        writeup_deadline:
          type: string
          format: date-time
          nullable: true
        is_public:
          type: boolean
        created_by:
          type: integer
        created_at:
          type: string
          format: date-time

    CreateGameRequest:
      type: object
      required: [name, start_time, end_time]
      properties:
        name:
          type: string
        description:
          type: string
        notice:
          type: string
        divisions:
          type: array
          items:
            type: string
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        scoreboard_freeze_at:
          type: string
          format: date-time
          nullable: true
        registration_mode:
          type: string
          enum: [review, auto_accept]
        max_team_members:
          type: integer
        practice_mode:
          type: boolean
        writeup_required:
          type: boolean
        writeup_deadline:
          type: string
          format: date-time
          nullable: true
        is_public:
          type: boolean

    UpdateGameRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        notice:
          type: string
        divisions:
          type: array
          items:
            type: string
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        scoreboard_freeze_at:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum: [draft, active, ended]
        registration_mode:
          type: string
          enum: [review, auto_accept]
        max_team_members:
          type: integer
        practice_mode:
          type: boolean
        writeup_required:
          type: boolean
        writeup_deadline:
          type: string
          format: date-time
          nullable: true
        is_public:
          type: boolean

    AddChallengeToGameRequest:
      type: object
      required: [challenge_id]
      properties:
        challenge_id:
          type: integer
        score_override:
          type: integer

    GameChallengeDetail:
      type: object
      required: [id, title, category, type, score]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [web, pwn, crypto, reverse, misc, forensics, awd]
        type:
          type: string
          enum: [static, dynamic]
        difficulty:
          type: string
        hints:
          type: string
        attachments:
          type: string
        score:
          type: integer
        solved:
          type: boolean
        solve_count:
          type: integer
        blood_team:
          type: string
        second_blood_team:
          type: string
        third_blood_team:
          type: string

    JoinGameRequest:
      type: object
      required: [team_id]
      properties:
        team_id:
          type: integer

    GameSubmitFlagRequest:
      type: object
      required: [flag, team_id]
      properties:
        flag:
          type: string
        team_id:
          type: integer

    ScoreboardEntry:
      type: object
      required: [rank, team_id, team_name, score, solve_count]
      properties:
        rank:
          type: integer
        team_id:
          type: integer
        team_name:
          type: string
        score:
          type: integer
        solve_count:
          type: integer
        last_solve:
          type: string
          format: date-time

    ScoreboardChallengeStat:
      type: object
      required: [id, title, category, score, solved_count]
      properties:
        id:
          type: integer
        title:
          type: string
        category:
          type: string
        score:
          type: integer
        solved_count:
          type: integer
        blood_team:
          type: string
        second_blood_team:
          type: string
        third_blood_team:
          type: string

    Scoreboard:
      type: object
      required: [game_id, entries]
      properties:
        game_id:
          type: integer
        division:
          type: string
        divisions:
          type: array
          items:
            type: string
        is_frozen:
          type: boolean
        freeze_time:
          type: string
          format: date-time
        entries:
          type: array
          items:
            $ref: "#/components/schemas/ScoreboardEntry"
        challenges:
          type: array
          items:
            $ref: "#/components/schemas/ScoreboardChallengeStat"

    GameParticipation:
      type: object
      required: [has_team, participated]
      properties:
        has_team:
          type: boolean
        participated:
          type: boolean
        status:
          type: string
          enum: [pending, accepted, rejected]
        division:
          type: string
        team:
          type: object
          required: [id, name]
          properties:
            id:
              type: integer
            name:
              type: string
        writeup_required:
          type: boolean
        writeup_submitted:
          type: boolean
        writeup_status:
          type: string
          enum: [submitted, approved, rejected]
        writeup_deadline:
          type: string
          format: date-time
          nullable: true
        writeup_deadline_passed:
          type: boolean
        missing_writeup:
          type: boolean
        divisions:
          type: array
          items:
            type: string

    GameParticipantEntry:
      type: object
      required: [team_id, team_name, status, joined_at, score, solve_count]
      properties:
        team_id:
          type: integer
        team_name:
          type: string
        status:
          type: string
          enum: [pending, accepted, rejected]
        division:
          type: string
        joined_at:
          type: string
          format: date-time
        score:
          type: integer
        solve_count:
          type: integer

    UpdateParticipationStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, accepted, rejected]
        division:
          type: string
          nullable: true

    ReviewGameWriteupRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [approved, rejected]
        remark:
          type: string

    GameWriteup:
      type: object
      required: [game_id, team_id, team_name, submitted_by, content, status, review_remark, submitted_at, can_submit]
      properties:
        game_id:
          type: integer
        team_id:
          type: integer
        team_name:
          type: string
        submitted_by:
          type: integer
        content:
          type: string
        status:
          type: string
          enum: [submitted, approved, rejected]
        reviewer_id:
          type: integer
          nullable: true
        review_remark:
          type: string
        submitted_at:
          type: string
          format: date-time
        reviewed_at:
          type: string
          format: date-time
          nullable: true
        can_submit:
          type: boolean

    SubmitGameWriteupRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string

    HealthResponse:
      type: object
      required: [status, version]
      properties:
        status:
          type: string
        version:
          type: string

paths:
  # ── Health ─────────────────────────────────────────────
  /api/healthz:
    get:
      operationId: healthz
      summary: Health check
      tags: [system]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  # ── Auth ───────────────────────────────────────────────
  /api/auth/register:
    post:
      operationId: register
      summary: Register a new user
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registered and logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Username or email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/login:
    post:
      operationId: login
      summary: Login with username or email
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/setup-status:
    get:
      operationId: getAuthSetupStatus
      summary: Get auth bootstrap setup status
      tags: [auth]
      responses:
        "200":
          description: Current bootstrap auth availability
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSetupStatusResponse"
        "500":
          description: Failed to inspect auth setup status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/logout:
    post:
      operationId: logout
      summary: Invalidate session
      tags: [auth]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /api/auth/me:
    get:
      operationId: getMe
      summary: Get current user info
      tags: [auth]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                type: object
                required: [user]
                properties:
                  user:
                    $ref: "#/components/schemas/UserInfo"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Teams ──────────────────────────────────────────────
  /api/teams:
    post:
      operationId: createTeam
      summary: Create a team
      tags: [teams]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTeamRequest"
      responses:
        "201":
          description: Team created
          content:
            application/json:
              schema:
                type: object
                required: [team]
                properties:
                  team:
                    $ref: "#/components/schemas/Team"
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/teams/my:
    get:
      operationId: getMyTeam
      summary: Get my team
      tags: [teams]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: My team
          content:
            application/json:
              schema:
                type: object
                required: [team]
                properties:
                  team:
                    $ref: "#/components/schemas/Team"
        "404":
          description: Not in any team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/teams/join:
    post:
      operationId: joinTeam
      summary: Join a team by invite code
      tags: [teams]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinTeamRequest"
      responses:
        "200":
          description: Joined
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "409":
          description: Already in a team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/teams/leave:
    post:
      operationId: leaveTeam
      summary: Leave current team
      tags: [teams]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Left
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "409":
          description: Cannot leave
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/teams/{teamId}/members/{memberId}:
    delete:
      operationId: removeTeamMember
      summary: Remove a team member (captain only)
      tags: [teams]
      security:
        - BearerAuth: []
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
        - name: memberId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "409":
          description: Cannot remove
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Challenges ─────────────────────────────────────────
  /api/challenges:
    get:
      operationId: listChallenges
      summary: List challenges
      tags: [challenges]
      security:
        - BearerAuth: []
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: show_hidden
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Challenge list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Challenge"

    post:
      operationId: createChallenge
      summary: Create a challenge (admin)
      tags: [challenges]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChallengeRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Challenge"

  /api/challenges/{id}:
    get:
      operationId: getChallenge
      summary: Get a challenge
      tags: [challenges]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Challenge
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Challenge"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      operationId: updateChallenge
      summary: Update a challenge (admin)
      tags: [challenges]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateChallengeRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Challenge"

    delete:
      operationId: deleteChallenge
      summary: Delete a challenge (admin)
      tags: [challenges]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /api/challenges/{id}/submit:
    post:
      operationId: submitChallengeFlag
      summary: Submit flag for standalone challenge
      tags: [challenges]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitFlagRequest"
      responses:
        "200":
          description: Correct flag
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitResult"
        "403":
          description: Wrong flag
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitResult"

  # ── Games ──────────────────────────────────────────────
  /api/games:
    get:
      operationId: listGames
      summary: List games
      tags: [games]
      parameters:
        - name: all
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Game list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Game"

    post:
      operationId: createGame
      summary: Create a game (admin)
      tags: [games]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGameRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Game"

  /api/games/{id}:
    get:
      operationId: getGame
      summary: Get a game
      tags: [games]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Game
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Game"
        "404":
          description: Not found
          content:
            application/json:
